<h2>Welcome {{user}}</h2>
<a href="/logout">Logout</a>

<input id="team" placeholder="Team Code">
<input id="uid" placeholder="UID">

{% for emote in emotes %}
<button onclick="sendEmote('{{emote.id}}')">
<img src="https://cdn.jsdelivr.net/gh/ShahGCreator/icon@main/PNG/{{emote.id}}.png" width="60">
<br>{{emote.name}}
</button>
{% endfor %}

<script>
function sendEmote(id){
fetch("/send_emote",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"team_code="+document.getElementById("team").value+
"&uid="+document.getElementById("uid").value+
"&emote_id="+id
})
.then(res=>res.json())
.then(()=>alert("Emote Sent ✅"))
}
</script>

<!DOCTYPE html>
<html>
<head>
<title>NLPanel Auth</title>
<style>
body{
background:#0a0a0f;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh
}
.box{
background:#111;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0 0 20px #ff00ff50
}
input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
background:#222;
color:#fff
}
button{
width:100%;
padding:10px;
background:#ff00ff;
border:none;
border-radius:5px;
color:#fff;
cursor:pointer
}
.toggle{
margin-top:15px;
cursor:pointer;
color:#ff00ff
}
</style>
</head>
<body>

<div class="box">
<h2 id="title">Login</h2>

<form method="post">
<input type="hidden" name="action" id="action" value="login">
<input name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Submit</button>
</form>

<div class="toggle" onclick="toggleForm()">
Don't have account? Register
</div>
</div>

<script>
let isLogin = true;

function toggleForm(){
isLogin = !isLogin;
document.getElementById("title").innerText = isLogin ? "Login" : "Register";
document.getElementById("action").value = isLogin ? "login" : "register";
document.querySelector(".toggle").innerText =
isLogin ? "Don't have account? Register" : "Already have account? Login";
}
</script>

</body>
</html>
